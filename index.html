<!DOCTYPE html>
<html>
<head>
    <title>Multi-Product Halver</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .product-card { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <h2>Add New Product</h2>
    <input type="text" id="name" placeholder="Product Name">
    <input type="number" id="price" placeholder="Starting Price">
    <button onclick="addProduct()">Add Product</button>

    <hr>
    <div id="productList"></div>

    <script>
        let products = JSON.parse(localStorage.getItem('products')) || [];

        function addProduct() {
            let name = document.getElementById('name').value;
            let price = parseFloat(document.getElementById('price').value);
            if (!name || !price) return;

            products.push({ name, price, count: 0, lastDate: new Date().toDateString() });
            saveAndRender();
        }

        function halvePrice(index) {
            products[index].price /= 2;
            products[index].count += 1;
            products[index].lastDate = new Date().toDateString();
            saveAndRender();
        }

        function resetProduct(index) {
            products.splice(index, 1);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('products', JSON.stringify(products));
            render();
        }

        function render() {
            let list = document.getElementById('productList');
            list.innerHTML = '';
            products.forEach((p, i) => {
                list.innerHTML += `
                    <div class="product-card">
                        <h3>${p.name}</h3>
                        <p>Price: $${p.price.toFixed(2)}</p>
                        <p>Used: ${p.count} times</p>
                        <button onclick="halvePrice(${i})">Halve Price</button>
                        <button onclick="resetProduct(${i})" style="background:#ffcccc;">Delete Product</button>
                    </div>
                `;
            });
        }

        // Automatic catch-up for all products
        products.forEach(p => {
            let diff = Math.floor((new Date() - new Date(p.lastDate)) / (1000 * 60 * 60 * 24));
            for(let i = 0; i < diff; i++) { p.price /= 2; p.count += 1; }
            p.lastDate = new Date().toDateString();
        });
        render();
    </script>
</body>
</html>
