<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Price Tracker</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --danger: #f85149; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .card { background: var(--card); border: 1px solid #30363d; padding: 15px; margin-top: 15px; border-radius: 8px; position: relative; }
        .btn-container { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .btn-top { border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.75em; color: white; }
        .delete-btn { background: var(--danger); }
        .edit-btn { background: #30363d; }
        input, button { padding: 10px; width: 100%; margin-top: 5px; box-sizing: border-box; }
        .btn-main { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Product Dashboard</h2>
    <input id="n" placeholder="Product Name">
    <input id="p" type="number" placeholder="Initial Price (£)">
    <button class="btn-main" onclick="add()">Add Product</button>
    <div id="list"></div>

    <script>
        let data = JSON.parse(localStorage.getItem('products') || '[]');

        function add() {
            let n = document.getElementById('n').value;
            let p = parseFloat(document.getElementById('p').value);
            if (!n || isNaN(p)) return;
            data.push({ name: n, initialPrice: p, count: 0 });
            saveAndRender();
        }

        function edit(i) {
            let newName = prompt("Edit Name:", data[i].name);
            let newPrice = parseFloat(prompt("Edit Initial Price:", data[i].initialPrice));
            if (newName) data[i].name = newName;
            if (!isNaN(newPrice)) data[i].initialPrice = newPrice;
            saveAndRender();
        }

        function del(i) {
            if (confirm('Are you sure you want to delete this?')) {
                data.splice(i, 1);
                saveAndRender();
            }
        }

        function use(i) {
            data[i].count += 1;
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('products', JSON.stringify(data));
            render();
        }

        function render() {
            document.getElementById('list').innerHTML = data.map((item, i) => {
                // Divisor calculation: 0 or 1 usages = 100% price. 2 usages = 50%, 3 usages = 33%
                let divisor = item.count === 0 ? 1 : item.count;
                let current = item.initialPrice / divisor;
                return `
                <div class="card">
                    <div class="btn-container">
                        <button class="btn-top edit-btn" onclick="edit(${i})">Edit</button>
                        <button class="btn-top delete-btn" onclick="del(${i})">Delete</button>
                    </div>
                    <h3>${item.name}</h3>
                    <p>Initial Price: £${item.initialPrice.toFixed(2)}</p>
                    <p>Current Price: <strong>£${current.toFixed(2)}</strong></p>
                    <p>Total Usages: <strong>${item.count}</strong></p>
                    <button class="btn-main" onclick="use(${i})">Use</button>
                </div>
            `}).join('');
        }
        render();
    </script>
</body>
</html>
