<!DOCTYPE html>
<html>
<head>
    <title>Price Halver</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        input, button { padding: 15px; font-size: 16px; }
        #display { font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <h2>Product Halver</h2>
    <input type="text" id="name" placeholder="Product Name">
    <input type="number" id="price" placeholder="Starting Price">
    <button onclick="saveData()">Initialize Product</button>
    
    <div id="controls" style="display:none;">
        <h3 id="productTitle"></h3>
        <p>Current Price: $<span id="currentPrice">0</span></p>
        <button onclick="halvePrice()">Halve Price</button>
        <p id="display"></p>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('productData')) || { name: '', price: 0, count: 0, lastDate: new Date().toDateString() };

        function checkMissedDays() {
            let today = new Date();
            let lastDate = new Date(data.lastDate);
            let diffDays = Math.floor((today - lastDate) / (1000 * 60 * 60 * 24));

            if (diffDays > 0 && data.name !== '') {
                for(let i = 0; i < diffDays; i++) {
                    data.price /= 2;
                    data.count += 1;
                }
                data.lastDate = today.toDateString();
                localStorage.setItem('productData', JSON.stringify(data));
                updateUI();
            }
        }

        function saveData() {
            data.name = document.getElementById('name').value;
            data.price = parseFloat(document.getElementById('price').value);
            data.count = 0;
            data.lastDate = new Date().toDateString();
            localStorage.setItem('productData', JSON.stringify(data));
            document.getElementById('controls').style.display = 'block';
            updateUI();
        }

        function halvePrice() {
            data.price /= 2;
            data.count += 1;
            data.lastDate = new Date().toDateString();
            localStorage.setItem('productData', JSON.stringify(data));
            updateUI();
        }

        function updateUI() {
            document.getElementById('productTitle').innerText = data.name;
            document.getElementById('currentPrice').innerText = data.price.toFixed(2);
            document.getElementById('display').innerText = `You have used ${data.name} ${data.count} times.`;
            document.getElementById('controls').style.display = 'block';
        }

        window.onload = checkMissedDays;
    </script>
</body>
</html>
